<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Tasks — Organize your day effortlessly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════
       CSS CUSTOM PROPERTIES
    ═══════════════════════════════════════════════ */
    :root {
      --bg-start: #0F172A;
      --bg-mid:   #1E293B;
      --bg-deep:  #312E81;
      --bg-accent:#4F46E5;

      --glass-bg:      rgba(255,255,255,0.07);
      --glass-bg-hover:rgba(255,255,255,0.11);
      --glass-border:  rgba(255,255,255,0.14);
      --glass-shadow:  0 20px 60px rgba(0,0,0,0.38);

      --primary:  #7C3AED;
      --primary-light: #9B59FF;
      --success:  #10B981;
      --danger:   #EF4444;
      --warning:  #F59E0B;

      --text-primary: #FFFFFF;
      --text-secondary: #CBD5E1;
      --text-muted: rgba(255,255,255,0.4);

      --radius-sm: 12px;
      --radius-md: 18px;
      --radius-lg: 24px;
      --radius-xl: 28px;

      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-spring: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ═══════════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-start);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 16px 80px;
      overflow-x: hidden;
      position: relative;
    }

    /* ═══════════════════════════════════════════════
       ANIMATED BACKGROUND
    ═══════════════════════════════════════════════ */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 40%, var(--bg-deep) 70%, var(--bg-accent) 100%);
      z-index: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.18;
      animation: floatBlob linear infinite;
      z-index: 0;
      pointer-events: none;
    }
    .blob-1 { width: 500px; height: 500px; background: #7C3AED; top: -100px; left: -120px; animation-duration: 22s; }
    .blob-2 { width: 420px; height: 420px; background: #4F46E5; bottom: 0;   right: -80px;  animation-duration: 28s; animation-delay: -8s; }
    .blob-3 { width: 320px; height: 320px; background: #10B981; top: 40%;    left: 50%;     animation-duration: 18s; animation-delay: -4s; }

    @keyframes floatBlob {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(40px,-30px) scale(1.06); }
      66%  { transform: translate(-20px,40px) scale(0.95); }
      100% { transform: translate(0,0) scale(1); }
    }

    /* ═══════════════════════════════════════════════
       MAIN CONTAINER
    ═══════════════════════════════════════════════ */
    .app {
      position: relative;
      z-index: 1;
      width: 700px;
      max-width: 95vw;
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: fadeSlideUp 0.7s cubic-bezier(0.4,0,0.2,1) both;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(36px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════════════════
       GLASS CARD MIXIN
    ═══════════════════════════════════════════════ */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: var(--radius-xl);
    }

    /* ═══════════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════════ */
    .header {
      padding: 36px 40px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, #4F46E5 100%);
      box-shadow: 0 8px 30px rgba(124,58,237,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg { width: 28px; height: 28px; }

    .header-text h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }

    .header-text p {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ═══════════════════════════════════════════════
       SEARCH BAR
    ═══════════════════════════════════════════════ */
    .search-wrap {
      padding: 0 40px;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 58px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-md);
      padding: 13px 18px 13px 44px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    .search-input::placeholder { color: var(--text-muted); }

    .search-input:focus {
      border-color: rgba(124,58,237,0.5);
      background: rgba(255,255,255,0.09);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.18);
    }

    /* ═══════════════════════════════════════════════
       INPUT SECTION
    ═══════════════════════════════════════════════ */
    .input-section {
      padding: 28px 40px;
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .task-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 15px;
      font-weight: 400;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    .task-input::placeholder { color: var(--text-muted); }

    .task-input:focus {
      border-color: rgba(124,58,237,0.6);
      background: rgba(255,255,255,0.10);
      box-shadow: 0 0 0 4px rgba(124,58,237,0.15), 0 0 20px rgba(124,58,237,0.08);
    }

    .btn-add {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 24px;
      background: linear-gradient(135deg, var(--primary) 0%, #5B21B6 100%);
      border: none;
      border-radius: var(--radius-md);
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform var(--transition-spring), box-shadow var(--transition);
      box-shadow: 0 8px 24px rgba(124,58,237,0.4);
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }

    .btn-add:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 14px 32px rgba(124,58,237,0.55);
    }

    .btn-add:active { transform: scale(0.97); }

    /* Ripple */
    .btn-add .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      animation: ripple 0.6s linear;
      pointer-events: none;
    }

    @keyframes ripple {
      from { transform: scale(0); opacity: 1; }
      to   { transform: scale(4); opacity: 0; }
    }

    /* ═══════════════════════════════════════════════
       STATS
    ═══════════════════════════════════════════════ */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 0 40px;
    }

    .stat-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 20px 16px;
      text-align: center;
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.3);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stat-card.total   .stat-value { color: #A78BFA; }
    .stat-card.done    .stat-value { color: var(--success); }
    .stat-card.pending .stat-value { color: var(--warning); }
    .stat-card.pct     .stat-value { color: #60A5FA; }

    /* ═══════════════════════════════════════════════
       FILTER CHIPS
    ═══════════════════════════════════════════════ */
    .filter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-chips {
      display: flex;
      gap: 8px;
    }

    .chip {
      padding: 8px 18px;
      border-radius: 100px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      outline: none;
    }

    .chip:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.2);
    }

    .chip.active {
      background: linear-gradient(135deg, var(--primary), #4F46E5);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 16px rgba(124,58,237,0.4);
      transform: scale(1.05);
    }

    .btn-clear {
      background: none;
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 100px;
      color: rgba(239,68,68,0.8);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-clear:hover {
      background: rgba(239,68,68,0.12);
      color: var(--danger);
      border-color: var(--danger);
    }

    /* ═══════════════════════════════════════════════
       TASK LIST
    ═══════════════════════════════════════════════ */
    .task-list-wrapper {
      padding: 0 40px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 60px;
    }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 48px 20px;
      animation: fadeSlideUp 0.5s ease both;
    }

    .empty-icon {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .empty-state h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .empty-state p {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ═══════════════════════════════════════════════
       TASK CARD
    ═══════════════════════════════════════════════ */
    .task-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition), opacity var(--transition);
      animation: taskSlideIn 0.35s cubic-bezier(0.4,0,0.2,1) both;
      cursor: default;
    }

    @keyframes taskSlideIn {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .task-card:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 16px 45px rgba(0,0,0,0.32);
      background: var(--glass-bg-hover);
    }

    .task-card.completed {
      opacity: 0.55;
    }

    .task-card.completed .task-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    /* Custom Checkbox */
    .task-checkbox-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .task-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 7px;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      transition: all var(--transition-spring);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .task-checkbox:checked {
      background: var(--success);
      border-color: var(--success);
      box-shadow: 0 0 14px rgba(16,185,129,0.5);
    }

    .task-checkbox:checked::after {
      content: '';
      display: block;
      width: 6px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px,-2px);
    }

    .task-checkbox:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    /* Task Text / Edit Input */
    .task-content { flex: 1; min-width: 0; }

    .task-text {
      font-size: 15px;
      font-weight: 450;
      color: var(--text-primary);
      line-height: 1.45;
      word-break: break-word;
      transition: color var(--transition);
    }

    .task-edit-input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(124,58,237,0.5);
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 15px;
      font-weight: 450;
      outline: none;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }

    /* Task Actions */
    .task-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .badge-done {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 100px;
      background: rgba(16,185,129,0.18);
      color: var(--success);
      border: 1px solid rgba(16,185,129,0.25);
      white-space: nowrap;
    }

    .btn-icon {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 9px;
      background: rgba(255,255,255,0.07);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      font-size: 15px;
      outline: none;
    }

    .btn-icon:hover { transform: scale(1.12); }
    .btn-icon:focus-visible { outline: 2px solid var(--primary); }

    .btn-icon.edit:hover   { background: rgba(124,58,237,0.2); color: #A78BFA; }
    .btn-icon.delete:hover { background: rgba(239,68,68,0.2);  color: var(--danger); }
    .btn-icon.save:hover   { background: rgba(16,185,129,0.2); color: var(--success); }

    /* ═══════════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════════ */
    .footer {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      padding: 20px 0 0;
    }

    .footer a {
      color: rgba(167,139,250,0.7);
      text-decoration: none;
    }

    /* ═══════════════════════════════════════════════
       TOAST NOTIFICATIONS
    ═══════════════════════════════════════════════ */
    #toast-container {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-radius: var(--radius-md);
      background: rgba(30,41,59,0.92);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      animation: toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
      min-width: 240px;
      max-width: 320px;
    }

    .toast.out { animation: toastOut 0.3s ease forwards; }

    @keyframes toastIn  { from { opacity:0; transform: translateX(30px) scale(0.92); } }
    @keyframes toastOut { to   { opacity:0; transform: translateX(30px) scale(0.92); } }

    .toast-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .toast.success .toast-dot { background: var(--success); }
    .toast.danger  .toast-dot { background: var(--danger);  }
    .toast.info    .toast-dot { background: #60A5FA; }
    .toast.warning .toast-dot { background: var(--warning); }

    /* ═══════════════════════════════════════════════
       CONFIRM MODAL
    ═══════════════════════════════════════════════ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity:0; } }

    .modal {
      background: rgba(30,41,59,0.95);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-xl);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      padding: 36px 40px;
      max-width: 360px;
      width: 90%;
      animation: fadeSlideUp 0.3s ease;
      text-align: center;
    }

    .modal h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .modal p  { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }

    .modal-actions { display: flex; gap: 10px; justify-content: center; }

    .btn-cancel, .btn-confirm {
      padding: 11px 24px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
    }

    .btn-cancel  { background: rgba(255,255,255,0.08); color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.12); }
    .btn-cancel:hover  { background: rgba(255,255,255,0.14); color: #fff; }
    .btn-confirm { background: var(--danger); color: #fff; box-shadow: 0 4px 16px rgba(239,68,68,0.35); }
    .btn-confirm:hover { background: #DC2626; transform: translateY(-1px); }

    /* ═══════════════════════════════════════════════
       KEYBOARD HINT
    ═══════════════════════════════════════════════ */
    .kbd-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 10px;
      text-align: center;
    }

    kbd {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 5px;
      padding: 2px 6px;
      font-family: inherit;
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* ═══════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════ */
    @media (max-width: 640px) {
      body { padding: 20px 12px 60px; }

      .header { padding: 24px 24px 20px; }
      .search-wrap { padding: 0 24px; }
      .input-section { padding: 20px 24px; }
      .stats-row { grid-template-columns: repeat(2,1fr); padding: 0 24px; }
      .filter-row { padding: 0 24px; }
      .task-list-wrapper { padding: 0 24px; }

      .stat-value { font-size: 22px; }
      .input-row { flex-direction: column; }
      .btn-add { width: 100%; justify-content: center; }
      .task-text { font-size: 14px; }
    }

    @media (max-width: 400px) {
      .stats-row { grid-template-columns: repeat(2,1fr); gap: 8px; }
      .stat-card { padding: 14px 10px; }
      .stat-value { font-size: 20px; }
      .filter-chips { flex-wrap: wrap; }
    }

    /* ═══════════════════════════════════════════════
       LOADING SHIMMER
    ═══════════════════════════════════════════════ */
    .shimmer {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.10) 50%, rgba(255,255,255,0.04) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius-lg);
      height: 64px;
    }

    @keyframes shimmer { to { background-position: -200% 0; } }

    /* Accessibility focus ring */
    :focus-visible { outline: 2px solid var(--primary); outline-offset: 3px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>

<body>
  <!-- Background -->
  <div class="bg-gradient" aria-hidden="true"></div>
  <div class="blob blob-1" aria-hidden="true"></div>
  <div class="blob blob-2" aria-hidden="true"></div>
  <div class="blob blob-3" aria-hidden="true"></div>

  <!-- Main App -->
  <main class="app" role="main">

    <!-- Header -->
    <header class="glass header" role="banner">
      <div class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>My Tasks</h1>
        <p>Organize your day effortlessly</p>
      </div>
    </header>

    <!-- Search -->
    <div class="glass search-wrap" style="padding: 14px 24px;">
      <span class="search-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
      </span>
      <input
        type="search"
        id="searchInput"
        class="search-input"
        placeholder="Search tasks…"
        aria-label="Search tasks"
        autocomplete="off"
        style="padding-left: 40px;"
      />
    </div>

    <!-- Input Section -->
    <section class="glass input-section" aria-label="Add new task">
      <div class="input-row">
        <input
          type="text"
          id="taskInput"
          class="task-input"
          placeholder="What needs to be done today?"
          aria-label="New task description"
          maxlength="200"
          autocomplete="off"
        />
        <button class="btn-add" id="addBtn" aria-label="Add task">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          Add Task
        </button>
      </div>
      <p class="kbd-hint"><kbd>↵ Enter</kbd> to add &nbsp;·&nbsp; <kbd>Esc</kbd> to cancel edit</p>
    </section>

    <!-- Stats -->
    <div class="stats-row" role="region" aria-label="Task statistics">
      <div class="stat-card total glass">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card done glass">
        <div class="stat-value" id="statDone">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card pending glass">
        <div class="stat-value" id="statPending">0</div>
        <div class="stat-label">Remaining</div>
      </div>
      <div class="stat-card pct glass">
        <div class="stat-value" id="statPct">0%</div>
        <div class="stat-label">Done</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-row" role="region" aria-label="Task filters">
      <div class="filter-chips" role="group" aria-label="Filter tasks">
        <button class="chip active" data-filter="all"       aria-pressed="true">All</button>
        <button class="chip"        data-filter="active"    aria-pressed="false">Active</button>
        <button class="chip"        data-filter="completed" aria-pressed="false">Completed</button>
      </div>
      <button class="btn-clear" id="clearCompleted" aria-label="Clear all completed tasks">Clear done</button>
    </div>

    <!-- Task List -->
    <section aria-label="Task list" id="taskListSection">
      <div class="task-list-wrapper" id="taskList" role="list"></div>
    </section>

    <!-- Footer -->
    <footer class="footer" role="contentinfo">
      Made with ❤️ using HTML, CSS &amp; JavaScript
    </footer>

  </main>

  <!-- Toast Container -->
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- Confirm Modal (injected dynamically) -->

  <script>
    /* ═══════════════════════════════════════════════
       STATE & STORAGE
    ═══════════════════════════════════════════════ */
    const STORAGE_KEY = 'mytasks_v2';

    let state = {
      tasks: [],
      filter: 'all',
      search: '',
      editingId: null,
    };

    function loadTasks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) state.tasks = JSON.parse(raw);
      } catch(e) { state.tasks = []; }
    }

    function saveTasks() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.tasks)); } catch(e){}
    }

    function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

    /* ═══════════════════════════════════════════════
       CRUD
    ═══════════════════════════════════════════════ */
    function addTask(text) {
      if (!text.trim()) return;
      const task = { id: genId(), text: text.trim(), completed: false, createdAt: Date.now() };
      state.tasks.unshift(task);
      saveTasks();
      render();
      showToast('Task added!', 'success');
    }

    function toggleTask(id) {
      const t = state.tasks.find(t => t.id === id);
      if (t) { t.completed = !t.completed; saveTasks(); render(); }
    }

    function deleteTask(id) {
      state.tasks = state.tasks.filter(t => t.id !== id);
      saveTasks();
      render();
      showToast('Task deleted.', 'danger');
    }

    function updateTask(id, newText) {
      const t = state.tasks.find(t => t.id === id);
      if (t && newText.trim()) { t.text = newText.trim(); saveTasks(); }
      state.editingId = null;
      render();
    }

    function clearCompleted() {
      const n = state.tasks.filter(t => t.completed).length;
      if (!n) { showToast('No completed tasks to clear.', 'info'); return; }
      confirmAction(`Clear ${n} completed task${n>1?'s':''}?`, 'This cannot be undone.', () => {
        state.tasks = state.tasks.filter(t => !t.completed);
        saveTasks();
        render();
        showToast(`${n} task${n>1?'s':''} cleared.`, 'info');
      });
    }

    /* ═══════════════════════════════════════════════
       FILTER & SEARCH
    ═══════════════════════════════════════════════ */
    function getVisible() {
      return state.tasks.filter(t => {
        const matchFilter =
          state.filter === 'all'       ||
          (state.filter === 'active'    && !t.completed) ||
          (state.filter === 'completed' &&  t.completed);
        const matchSearch = !state.search || t.text.toLowerCase().includes(state.search.toLowerCase());
        return matchFilter && matchSearch;
      });
    }

    /* ═══════════════════════════════════════════════
       RENDER
    ═══════════════════════════════════════════════ */
    function render() {
      renderStats();
      renderList();
    }

    function renderStats() {
      const total     = state.tasks.length;
      const done      = state.tasks.filter(t => t.completed).length;
      const remaining = total - done;
      const pct       = total ? Math.round((done/total)*100) : 0;

      document.getElementById('statTotal').textContent   = total;
      document.getElementById('statDone').textContent    = done;
      document.getElementById('statPending').textContent = remaining;
      document.getElementById('statPct').textContent     = pct + '%';
    }

    function renderList() {
      const list    = document.getElementById('taskList');
      const visible = getVisible();
      list.innerHTML = '';

      if (!visible.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        const icons = { all: '📋', active: '✨', completed: '🎉' };
        const msgs  = {
          all:       ['No tasks yet', 'Add your first task above to get started.'],
          active:    ['All caught up!', 'No active tasks — great work.'],
          completed: ['Nothing completed yet', 'Finish a task to see it here.'],
        };
        const [h, p] = msgs[state.filter] || msgs.all;
        empty.innerHTML = `
          <div class="empty-icon" aria-hidden="true">${icons[state.filter]||'📋'}</div>
          <h3>${h}</h3>
          <p>${p}</p>`;
        list.appendChild(empty);
        return;
      }

      visible.forEach((task, i) => {
        const card = buildTaskCard(task, i);
        list.appendChild(card);
      });
    }

    function buildTaskCard(task, idx) {
      const div = document.createElement('div');
      div.className = 'task-card' + (task.completed ? ' completed' : '');
      div.setAttribute('role', 'listitem');
      div.style.animationDelay = `${idx * 0.04}s`;

      const isEditing = state.editingId === task.id;

      div.innerHTML = `
        <!-- Checkbox -->
        <div class="task-checkbox-wrap">
          <input
            type="checkbox"
            class="task-checkbox"
            ${task.completed ? 'checked' : ''}
            aria-label="${task.completed ? 'Mark incomplete' : 'Mark complete'}: ${escHtml(task.text)}"
            data-id="${task.id}"
          />
        </div>

        <!-- Text / Edit -->
        <div class="task-content">
          ${isEditing
            ? `<input class="task-edit-input" id="edit_${task.id}" value="${escHtml(task.text)}" maxlength="200" aria-label="Edit task text" />`
            : `<span class="task-text">${highlight(escHtml(task.text), state.search)}</span>`
          }
        </div>

        <!-- Actions -->
        <div class="task-actions">
          ${task.completed ? '<span class="badge-done">Done</span>' : ''}
          ${isEditing
            ? `<button class="btn-icon save" data-action="save" data-id="${task.id}" title="Save (Enter)" aria-label="Save task">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>
               </button>`
            : `<button class="btn-icon edit" data-action="edit" data-id="${task.id}" title="Edit task" aria-label="Edit task: ${escHtml(task.text)}">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
               </button>`
          }
          <button class="btn-icon delete" data-action="delete" data-id="${task.id}" title="Delete task" aria-label="Delete task: ${escHtml(task.text)}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      `;

      // Focus edit input
      if (isEditing) {
        requestAnimationFrame(() => {
          const inp = div.querySelector('.task-edit-input');
          if (inp) { inp.focus(); inp.select(); }
        });
      }

      return div;
    }

    /* ═══════════════════════════════════════════════
       UTILITIES
    ═══════════════════════════════════════════════ */
    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function highlight(text, query) {
      if (!query) return text;
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark style="background:rgba(124,58,237,0.35);color:inherit;border-radius:3px;padding:0 2px;">$1</mark>');
    }

    /* ═══════════════════════════════════════════════
       TOAST
    ═══════════════════════════════════════════════ */
    function showToast(msg, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span class="toast-dot"></span>${escHtml(msg)}`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('out');
        toast.addEventListener('animationend', () => toast.remove());
      }, 2800);
    }

    /* ═══════════════════════════════════════════════
       CONFIRM MODAL
    ═══════════════════════════════════════════════ */
    function confirmAction(title, subtitle, onConfirm) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.setAttribute('role', 'dialog');
      overlay.setAttribute('aria-modal', 'true');
      overlay.setAttribute('aria-labelledby', 'modal-title');
      overlay.innerHTML = `
        <div class="modal">
          <h3 id="modal-title">${escHtml(title)}</h3>
          <p>${escHtml(subtitle)}</p>
          <div class="modal-actions">
            <button class="btn-cancel" id="modalCancel">Cancel</button>
            <button class="btn-confirm" id="modalConfirm">Delete</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);

      const remove = () => overlay.remove();
      overlay.querySelector('#modalCancel').addEventListener('click', remove);
      overlay.querySelector('#modalConfirm').addEventListener('click', () => { remove(); onConfirm(); });
      overlay.addEventListener('click', e => { if (e.target === overlay) remove(); });
      overlay.querySelector('#modalConfirm').focus();
      const onKey = e => { if (e.key==='Escape') { remove(); document.removeEventListener('keydown', onKey); } };
      document.addEventListener('keydown', onKey);
    }

    /* ═══════════════════════════════════════════════
       RIPPLE EFFECT
    ═══════════════════════════════════════════════ */
    function addRipple(btn, e) {
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height) * 2;
      const x = e.clientX - rect.left - size/2;
      const y = e.clientY - rect.top  - size/2;
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;
      btn.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());
    }

    /* ═══════════════════════════════════════════════
       EVENT LISTENERS
    ═══════════════════════════════════════════════ */
    // Add task
    document.getElementById('addBtn').addEventListener('click', function(e) {
      addRipple(this, e);
      const inp = document.getElementById('taskInput');
      addTask(inp.value);
      inp.value = '';
      inp.focus();
    });

    // Enter to add
    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addTask(e.target.value);
        e.target.value = '';
      }
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', e => {
      state.search = e.target.value;
      render();
    });

    // Filter chips
    document.querySelectorAll('.chip[data-filter]').forEach(chip => {
      chip.addEventListener('click', function() {
        document.querySelectorAll('.chip[data-filter]').forEach(c => {
          c.classList.remove('active');
          c.setAttribute('aria-pressed', 'false');
        });
        this.classList.add('active');
        this.setAttribute('aria-pressed', 'true');
        state.filter = this.dataset.filter;
        render();
      });
    });

    // Clear completed
    document.getElementById('clearCompleted').addEventListener('click', clearCompleted);

    // Task list — event delegation
    document.getElementById('taskList').addEventListener('click', e => {
      const btn = e.target.closest('[data-action]');
      const cb  = e.target.closest('.task-checkbox');

      if (cb) {
        toggleTask(cb.dataset.id);
        return;
      }

      if (!btn) return;
      const { action, id } = btn.dataset;

      if (action === 'edit') {
        state.editingId = id;
        render();
      } else if (action === 'save') {
        const inp = document.getElementById(`edit_${id}`);
        if (inp) updateTask(id, inp.value);
      } else if (action === 'delete') {
        confirmAction('Delete this task?', 'This action cannot be undone.', () => deleteTask(id));
      }
    });

    // Esc to cancel edit; Enter to save edit
    document.getElementById('taskList').addEventListener('keydown', e => {
      if (state.editingId) {
        if (e.key === 'Escape') {
          state.editingId = null;
          render();
        } else if (e.key === 'Enter') {
          const inp = document.getElementById(`edit_${state.editingId}`);
          if (inp) updateTask(state.editingId, inp.value);
        }
      }
    });

    /* ═══════════════════════════════════════════════
       INIT
    ═══════════════════════════════════════════════ */
    (function init() {
      // Show shimmer briefly
      const list = document.getElementById('taskList');
      list.innerHTML = `<div class="shimmer"></div><div class="shimmer" style="opacity:.5;margin-top:10px"></div>`;

      setTimeout(() => {
        loadTasks();
        render();
        document.getElementById('taskInput').focus();
      }, 450);
    })();
  </script>
</body>
</html>